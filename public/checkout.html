<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liverpool Fan Shop – Checkout</title>
    <link id="favicon" rel="icon" href="Liverpool-FC-80s-icon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">

    <!-- Meta Pixel Base Code -->

      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window,document,'script',

      src="https://www.facebook.com/tr?id=1914070242854182&ev=PageView&noscript=1"/></noscript>

    <!-- CAPI Parameter Builder Client-Side Script -->
    <script src="https://capi-automation.s3.us-east-2.amazonaws.com/public/client_js/capiParamBuilder/clientParamBuilder.bundle.js"></script>
    <script>
      (async () => {
        const getIpFn = async function () {
            try {
                return await (await fetch("/api/get-ip")).text();
            } catch (e) {
                return null;
            }
        };
        await clientParamBuilder.processAndCollectAllParams(window.location.href, getIpFn);
      })();
    </script>
    <!-- End CAPI Parameter Builder Client-Side Script -->
</head>
<body>
    <header>
        <nav>
            <a class="nav-brand" href="index.html">
                <img src="Liverpool-FC-80s-icon.png" alt="LFC">
                Liverpool Fan Shop
            </a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart <span class="nav-cart-badge" id="cart-count">0</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Checkout</h1>
        <div class="checkout-container">

            <!-- Shipping / Contact Form -->
            <div class="form-card">
                <h2>Shipping Information</h2>
                <form id="checkout-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" value="John Doe">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" value="johndoe@example.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="address">Street Address</label>
                        <input type="text" id="address" value="123 Main St">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" value="Anytown">
                        </div>
                        <div class="form-group">
                            <label for="state">State</label>
                            <input type="text" id="state" value="CA">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="zip">ZIP Code</label>
                        <input type="text" id="zip" value="12345">
                    </div>
                    <button id="purchase-btn" type="button" class="btn-purchase" onclick="completePurchase()">
                        Complete Purchase
                    </button>
                </form>
            </div>

            <!-- Order Summary -->
            <div class="summary-card">
                <h2>Order Summary</h2>
                <table id="cart-summary-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="cart-summary-body"></tbody>
                </table>
                <div class="summary-total">
                    <span>Total</span>
                    <span>$<span id="cart-total">0.00</span></span>
                </div>
            </div>

        </div>
    </main>

    <footer>
        &copy; 2025 Liverpool Fan Shop &mdash; Demo site for Meta CAPI Workshop
    </footer>

    <script src="script.js"></script>
</body>
</html>
